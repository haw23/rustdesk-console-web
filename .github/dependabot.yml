version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    reviewers:
      - "YuZhiYuanDev"
    assignees:
      - "YuZhiYuanDev"
    versioning-strategy: "increase-if-necessary"
    ignore:
      - dependency-name: "react"
        versions: ["20.x"]
      - dependency-name: "react-dom"
        versions: ["20.x"]
      - dependency-name: "antd"
        versions: ["6.x"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "YuZhiYuanDev"
    assignees:
      - "YuZhiYuanDev"
    groups:
      github-actions:
        patterns:
          - "*"
